services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    container_name: testcase_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-testcase_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testcase_pass}
      POSTGRES_DB: ${DB_NAME:-testcase_db}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-testcase_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: testcase_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
