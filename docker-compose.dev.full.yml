version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: testcase_frontend_dev
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - testcase_network_dev

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: testcase_backend_dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://testcase_user:testcase_pass@postgres:5432/testcase_db
      - JWT_SECRET=dev-jwt-secret-2024
      - JWT_EXPIRES_IN=7d
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=Admin@123456
      - OPENAI_API_KEY=sk-dev-placeholder-api-key
      - OPENAI_BASE_URL=https://api.openai.com/v1
      - DEFAULT_AI_MODEL=gpt-4o
      - UPLOAD_DIR=./uploads
      - MAX_FILE_SIZE=10485760
      - APP_PORT=3000
      - THROTTLE_TTL=60
      - THROTTLE_LIMIT=100
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - testcase_network_dev

  # 数据库服务
  postgres:
    image: postgres:15-alpine
    container_name: testcase_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: testcase_user
      POSTGRES_PASSWORD: testcase_pass
      POSTGRES_DB: testcase_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U testcase_user']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testcase_network_dev

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: testcase_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - testcase_network_dev

volumes:
  postgres_data_dev:
  redis_data_dev:

networks:
  testcase_network_dev:
    driver: bridge