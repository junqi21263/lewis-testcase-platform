# 云服务器生产部署：推送 main/develop 时 rsync + docker compose 全栈。
#
# GitHub → Repository → Settings → Secrets and variables → Actions
#   Secrets (required): SSH_HOST, SSH_USER, SSH_KEY
#   Variables (optional): DEPLOY_PATH, DEV_DEPLOY_PATH, DEPLOY_REGION=cn（大陆 VPS 拉 Docker Hub 加速）,
#     DEPLOY_PULL_FROM_MIRROR, CONTAINER_MIRROR_IMAGE_PREFIX, APK_MIRROR, DEPLOY_BUILD_ON_SERVER,
#     MIRROR_STEP_TIMEOUT_MIN（可选，国内镜像同步步骤超时分钟数，默认 90）
#
name: Deploy to VPS

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: false

# -----------------------------------------------------------------------------
# 共享：解析分支环境（供多 job 使用 outputs）
# -----------------------------------------------------------------------------
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      ENV: ${{ steps.env.outputs.ENV }}
      DEPLOY_PATH: ${{ steps.env.outputs.DEPLOY_PATH }}
      ENV_FILE: ${{ steps.env.outputs.ENV_FILE }}
      IMAGE_TAG: ${{ steps.env.outputs.IMAGE_TAG }}
      INSTALL_CJK_FONTS: ${{ steps.env.outputs.INSTALL_CJK_FONTS }}
      ghcr_repo: ${{ steps.env.outputs.ghcr_repo }}
      deploy_t0: ${{ steps.timing.outputs.deploy_t0 }}
    steps:
      - id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "ENV=development" >> $GITHUB_OUTPUT
            echo "DEPLOY_PATH=${{ vars.DEV_DEPLOY_PATH || '/opt/lewis_testcase_platform_dev' }}" >> $GITHUB_OUTPUT
            echo "ENV_FILE=.env.development" >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=develop" >> $GITHUB_OUTPUT
            echo "INSTALL_CJK_FONTS=0" >> $GITHUB_OUTPUT
          else
            echo "ENV=production" >> $GITHUB_OUTPUT
            echo "DEPLOY_PATH=${{ vars.DEPLOY_PATH || '/opt/lewis_testcase_platform' }}" >> $GITHUB_OUTPUT
            echo "ENV_FILE=.env" >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=main" >> $GITHUB_OUTPUT
            echo "INSTALL_CJK_FONTS=1" >> $GITHUB_OUTPUT
          fi
          echo "ghcr_repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - id: timing
        run: echo "deploy_t0=$(date +%s)" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # 并行：前端静态资源构建（与后端镜像构建同时进行，缩短 wall-clock）
  # ---------------------------------------------------------------------------
  vite-build:
    needs: setup
    if: ${{ vars.DEPLOY_BUILD_ON_SERVER != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      wall_sec: ${{ steps.job_timing.outputs.wall_sec }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}
        run: |
          set -euo pipefail
          T0="${{ needs.setup.outputs.deploy_t0 }}"
          NOW=$(date +%s)
          echo "::notice::phase=vite_build_start seconds_since_setup_start=$((NOW - T0))"
          export VITE_API_BASE_URL="${VITE_API_BASE_URL:-/api}"
          export VITE_APP_NAME="${VITE_APP_NAME:-}"
          pnpm install --frozen-lockfile
          pnpm run build
          NOW=$(date +%s)
          echo "::notice::phase=vite_build_done seconds_since_setup_start=$((NOW - T0))"

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 2

      - id: job_timing
        if: always()
        env:
          T0: ${{ needs.setup.outputs.deploy_t0 }}
        run: echo "wall_sec=$(( $(date +%s) - T0 ))" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 并行：仅构建并推送 backend 镜像到 GHCR（不依赖 frontend dist）
  # ---------------------------------------------------------------------------
  docker-backend:
    needs: setup
    if: ${{ vars.DEPLOY_BUILD_ON_SERVER != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      wall_sec: ${{ steps.job_timing.outputs.wall_sec }}
    permissions:
      contents: read
      packages: write
      actions: write
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=backend-amd64
          cache-to: type=gha,mode=max,scope=backend-amd64
          tags: |
            ghcr.io/${{ needs.setup.outputs.ghcr_repo }}/backend:${{ github.sha }}
            ghcr.io/${{ needs.setup.outputs.ghcr_repo }}/backend:${{ needs.setup.outputs.IMAGE_TAG }}
          build-args: |
            INSTALL_CJK_FONTS=${{ needs.setup.outputs.INSTALL_CJK_FONTS }}
            APK_MIRROR=${{ vars.APK_MIRROR }}

      - id: job_timing
        if: always()
        env:
          T0: ${{ needs.setup.outputs.deploy_t0 }}
        run: |
          echo "wall_sec=$(( $(date +%s) - T0 ))" >> "$GITHUB_OUTPUT"
          echo "::notice::phase=docker_backend_job_end seconds_since_setup_start=$(( $(date +%s) - T0 ))"

  # ---------------------------------------------------------------------------
  # 合并：frontend 镜像 + 可选国内镜像同步 + rsync + VPS 部署
  # ---------------------------------------------------------------------------
  deploy:
    needs: [setup, vite-build, docker-backend]
    if: ${{ vars.DEPLOY_BUILD_ON_SERVER != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=frontend-amd64
          cache-to: type=gha,mode=max,scope=frontend-amd64
          tags: |
            ghcr.io/${{ needs.setup.outputs.ghcr_repo }}/frontend:${{ github.sha }}
            ghcr.io/${{ needs.setup.outputs.ghcr_repo }}/frontend:${{ needs.setup.outputs.IMAGE_TAG }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_APP_NAME=${{ vars.VITE_APP_NAME }}
            APK_MIRROR=${{ vars.APK_MIRROR }}

      - name: Timing after frontend image
        run: |
          T0="${{ needs.setup.outputs.deploy_t0 }}"
          echo "::notice::phase=docker_frontend_pushed seconds_since_setup_start=$(( $(date +%s) - T0 ))"

      - name: Mirror images to domestic registry (optional)
        if: ${{ vars.DEPLOY_PULL_FROM_MIRROR == 'true' }}
        # 与 job timeout 衔接；实际 pull/push 时长由下方 timeout 命令与 MIRROR_STEP_TIMEOUT_MIN 控制
        timeout-minutes: 95
        env:
          GHCR_PREFIX: ghcr.io/${{ needs.setup.outputs.ghcr_repo }}
          MIRROR_PREFIX: ${{ vars.CONTAINER_MIRROR_IMAGE_PREFIX }}
          SHA: ${{ github.sha }}
          MIRROR_REG: ${{ secrets.CONTAINER_MIRROR_REGISTRY }}
          MIRROR_USER: ${{ secrets.CONTAINER_MIRROR_USERNAME }}
          MIRROR_PASS: ${{ secrets.CONTAINER_MIRROR_PASSWORD }}
          MIRROR_TIMEOUT_MIN: ${{ vars.MIRROR_STEP_TIMEOUT_MIN || '90' }}
        run: |
          set -euo pipefail
          if [ -z "${MIRROR_PREFIX:-}" ] || [ -z "${MIRROR_REG:-}" ] || [ -z "${MIRROR_USER:-}" ] || [ -z "${MIRROR_PASS:-}" ]; then
            echo "::error::DEPLOY_PULL_FROM_MIRROR=true requires Variable CONTAINER_MIRROR_IMAGE_PREFIX and Secrets CONTAINER_MIRROR_REGISTRY, CONTAINER_MIRROR_USERNAME, CONTAINER_MIRROR_PASSWORD"
            exit 1
          fi
          echo "$MIRROR_PASS" | docker login "$MIRROR_REG" -u "$MIRROR_USER" --password-stdin
          T0="${{ needs.setup.outputs.deploy_t0 }}"
          echo "::notice::phase=mirror_start seconds_since_setup_start=$(( $(date +%s) - T0 ))"
          TM="${MIRROR_TIMEOUT_MIN:-90}"
          set +e
          timeout "${TM}m" env GHCR_PREFIX="$GHCR_PREFIX" MIRROR_PREFIX="$MIRROR_PREFIX" SHA="$SHA" bash -eo pipefail -c '
            for svc in backend frontend; do
              echo "Mirroring ${svc}..."
              docker pull "${GHCR_PREFIX}/${svc}:${SHA}"
              docker tag "${GHCR_PREFIX}/${svc}:${SHA}" "${MIRROR_PREFIX}/${svc}:${SHA}"
              docker push "${MIRROR_PREFIX}/${svc}:${SHA}"
            done
          '
          rc=$?
          set -e
          if [ "$rc" -eq 124 ]; then
            echo "::error::国内镜像同步超过 ${TM} 分钟（timeout）。可在仓库 Variables 设置 MIRROR_STEP_TIMEOUT_MIN 增大；或检查 Runner→国内仓网络。"
            exit 124
          fi
          if [ "$rc" -ne 0 ]; then
            echo "::error::国内镜像同步失败（exit $rc）"
            exit "$rc"
          fi
          echo "✅ Mirror push complete; VPS will pull from ${MIRROR_PREFIX}"
          echo "::notice::phase=mirror_done seconds_since_setup_start=$(( $(date +%s) - T0 ))"

      - name: Prepare SSH known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync code to server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ needs.setup.outputs.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          T0="${{ needs.setup.outputs.deploy_t0 }}"
          echo "::notice::phase=rsync_start seconds_since_setup_start=$(( $(date +%s) - T0 ))"
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" "sudo mkdir -p \"$DEPLOY_PATH\""
          rsync -az --delete \
            -e "ssh -i /tmp/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=yes" \
            --rsync-path="sudo rsync" \
            --exclude ".git/" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "backend/.env" \
            --exclude "frontend/.env" \
            --exclude "node_modules/" \
            --exclude "frontend/node_modules/" \
            --exclude "backend/node_modules/" \
            --exclude "backend/uploads/" \
            --exclude "frontend/dist/" \
            --exclude "backend/dist/" \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
          echo "::notice::phase=rsync_done seconds_since_setup_start=$(( $(date +%s) - T0 ))"

      - name: Deploy on server (docker compose)
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          command_timeout: 240m
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ needs.setup.outputs.DEPLOY_PATH }}"
            ENV_FILE="${{ needs.setup.outputs.ENV_FILE }}"
            cd "$DEPLOY_PATH"
            echo "🚀 Deploying to ${{ needs.setup.outputs.ENV }} environment at $DEPLOY_PATH"
            REGION="${{ vars.DEPLOY_REGION }}"
            case "${REGION:-global}" in
              cn)
                echo "🔧 DEPLOY_REGION=cn: merging CN-oriented Docker Hub registry mirrors into daemon.json..."
                sudo mkdir -p /etc/docker
                if command -v python3 >/dev/null 2>&1; then
                  MERGE_OUT=$(sudo python3 "$DEPLOY_PATH/scripts/merge-docker-mirrors.py")
                  if [ "$MERGE_OUT" = "restart" ]; then
                    echo "✅ daemon.json updated, restarting Docker..."
                    sudo systemctl daemon-reload
                    sudo systemctl restart docker
                    sleep 5
                  else
                    echo "✅ registry mirrors already satisfied"
                  fi
                else
                  echo "⚠️ python3 not found; cannot merge daemon.json. Install python3 or configure mirrors manually."
                fi
                ;;
              *)
                echo "🔧 DEPLOY_REGION=${REGION:-global}: skipping CN Docker Hub mirrors (set DEPLOY_REGION=cn on mainland China VPS if pulls are slow)"
                ;;
            esac
            sudo mkdir -p "$DEPLOY_PATH"
            if [ ! -f "$DEPLOY_PATH/$ENV_FILE" ]; then
              echo "⚠️  $ENV_FILE not found, copying from example..."
              if [ -f "$DEPLOY_PATH/$ENV_FILE.example" ]; then
                sudo cp "$DEPLOY_PATH/$ENV_FILE.example" "$DEPLOY_PATH/$ENV_FILE"
                echo "✅ Created $ENV_FILE from template. Please edit it with production values!"
              fi
            fi
            if [ "${{ needs.setup.outputs.ENV }}" = "development" ]; then
              sudo sed -i '/^FRONTEND_HOST_BIND=/d;/^FRONTEND_HOST_PORT=/d;/^POSTGRES_HOST_BIND=/d;/^POSTGRES_HOST_PORT=/d;/^REDIS_HOST_BIND=/d;/^REDIS_HOST_PORT=/d' "$DEPLOY_PATH/$ENV_FILE"
              sudo bash -c "printf '\nFRONTEND_HOST_BIND=0.0.0.0\nFRONTEND_HOST_PORT=8080\nPOSTGRES_HOST_BIND=127.0.0.1\nPOSTGRES_HOST_PORT=5433\nREDIS_HOST_BIND=127.0.0.1\nREDIS_HOST_PORT=6380\n' >> '$DEPLOY_PATH/$ENV_FILE'"
            fi
            if [ "${{ needs.setup.outputs.ENV }}" = "development" ]; then
              echo "🧹 Cleaning up old development containers..."
              sudo docker stop testcase_dev_redis testcase_dev_postgres testcase_dev_backend testcase_dev_frontend 2>/dev/null || true
              sudo docker rm testcase_dev_redis testcase_dev_postgres testcase_dev_backend testcase_dev_frontend 2>/dev/null || true
              echo "✅ Old containers cleaned up"
            fi
            BUILD_ON_SERVER="${{ vars.DEPLOY_BUILD_ON_SERVER }}"
            if [ "${{ needs.setup.outputs.ENV }}" = "development" ]; then
              STACK_PREFIX="${STACK_PREFIX:-testcase_dev}"
              export FRONTEND_HOST_PORT=8080
              export POSTGRES_HOST_PORT=5433
              export REDIS_HOST_PORT=6380
            else
              STACK_PREFIX="${STACK_PREFIX:-testcase}"
              export FRONTEND_HOST_PORT=80
              export POSTGRES_HOST_PORT=5432
              export REDIS_HOST_PORT=6379
            fi
            export STACK_PREFIX
            export COMPOSE_ENV_FILE="$ENV_FILE"
            SHA="${{ github.sha }}"
            if [ "${{ vars.DEPLOY_PULL_FROM_MIRROR }}" = "true" ]; then
              echo "📦 Domestic mirror pull (no ghcr.io on VPS)."
              MIRROR_PREFIX="${{ vars.CONTAINER_MIRROR_IMAGE_PREFIX }}"
              export BACKEND_IMAGE="${MIRROR_PREFIX}/backend:${SHA}"
              export FRONTEND_IMAGE="${MIRROR_PREFIX}/frontend:${SHA}"
              echo "${{ secrets.CONTAINER_MIRROR_PASSWORD }}" | sudo docker login "${{ secrets.CONTAINER_MIRROR_REGISTRY }}" -u "${{ secrets.CONTAINER_MIRROR_USERNAME }}" --password-stdin
            else
              echo "📦 GHCR prebuilt images (docker-compose.ghcr.yml); VPS pull ghcr.io."
              GHCR_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
              export BACKEND_IMAGE="ghcr.io/${GHCR_REPO}/backend:${SHA}"
              export FRONTEND_IMAGE="ghcr.io/${GHCR_REPO}/frontend:${SHA}"
              if [ -n "${{ secrets.GHCR_PULL_TOKEN }}" ]; then
                echo "${{ secrets.GHCR_PULL_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin
              fi
            fi
            if [ "${{ needs.setup.outputs.ENV }}" = "development" ]; then
              COMPOSE_FILES="-f docker-compose.ghcr.yml -f docker-compose.dev.override.yml"
            else
              COMPOSE_FILES="-f docker-compose.ghcr.yml"
            fi
            SMOKE_COMPOSE_FILE="docker-compose.ghcr.yml"
            if [ -n "${{ vars.APK_MIRROR }}" ]; then
              export APK_MIRROR="${{ vars.APK_MIRROR }}"
              echo "📦 APK_MIRROR from GitHub Variables: $APK_MIRROR"
            fi
            deploy_compose_env=(DOCKER_BUILDKIT=1 BUILDKIT_PROGRESS=plain STACK_PREFIX="$STACK_PREFIX" FRONTEND_HOST_PORT="$FRONTEND_HOST_PORT" POSTGRES_HOST_PORT="$POSTGRES_HOST_PORT" REDIS_HOST_PORT="$REDIS_HOST_PORT")
            if [ -n "${APK_MIRROR:-}" ]; then
              deploy_compose_env+=(APK_MIRROR="$APK_MIRROR")
            fi
            deploy_compose_env+=(BACKEND_IMAGE="$BACKEND_IMAGE" FRONTEND_IMAGE="$FRONTEND_IMAGE")
            if sudo docker compose version >/dev/null 2>&1; then
              pull_ok=0
              for attempt in 1 2 3 4 5; do
                echo "📥 docker compose pull backend frontend (attempt $attempt/5)..."
                if sudo env "${deploy_compose_env[@]}" docker compose $COMPOSE_FILES --env-file "$ENV_FILE" pull backend frontend; then
                  pull_ok=1
                  break
                fi
                echo "⚠️ Pull failed (network?), retry in 25s..."
                sleep 25
              done
              if [ "$pull_ok" != "1" ]; then
                echo "::error::docker compose pull failed after 5 attempts"
                exit 1
              fi
              sudo env "${deploy_compose_env[@]}" docker compose $COMPOSE_FILES --env-file "$ENV_FILE" up -d
            else
              pull_ok=0
              for attempt in 1 2 3 4 5; do
                echo "📥 docker-compose pull backend frontend (attempt $attempt/5)..."
                if sudo env "${deploy_compose_env[@]}" docker-compose $COMPOSE_FILES --env-file "$ENV_FILE" pull backend frontend; then
                  pull_ok=1
                  break
                fi
                echo "⚠️ Pull failed (network?), retry in 25s..."
                sleep 25
              done
              if [ "$pull_ok" != "1" ]; then
                echo "::error::docker-compose pull failed after 5 attempts"
                exit 1
              fi
              sudo env "${deploy_compose_env[@]}" docker-compose $COMPOSE_FILES --env-file "$ENV_FILE" up -d
            fi
            echo "✅ Deployment to ${{ needs.setup.outputs.ENV }} completed"
            if [ "${{ needs.setup.outputs.ENV }}" = "development" ]; then
              echo "🧪 Running development smoke check on port 8080..."
              ok=0
              for i in $(seq 1 60); do
                if curl -fsS "http://127.0.0.1:8080/health" 2>/dev/null | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
                  ok=1
                  break
                fi
                sleep 2
              done
              if [ "$ok" != "1" ]; then
                echo "❌ Smoke check failed after waiting 60s"
                sudo env "${deploy_compose_env[@]}" docker compose $COMPOSE_FILES --env-file "$ENV_FILE" ps || true
                sudo env "${deploy_compose_env[@]}" docker compose $COMPOSE_FILES --env-file "$ENV_FILE" logs --tail=100 backend frontend || true
                exit 1
              fi
              echo "✅ Smoke check passed"
              echo "访问地址: http://${{ secrets.SSH_HOST }}:8080"
            else
              env STACK_PREFIX="$STACK_PREFIX" COMPOSE_ENV_FILE="$ENV_FILE" COMPOSE_FILE="$SMOKE_COMPOSE_FILE" bash scripts/smoke.sh
            fi

      - name: Deploy timings summary
        if: always()
        env:
          DEPLOY_T0: ${{ needs.setup.outputs.deploy_t0 }}
          VITE_WALL: ${{ needs.vite-build.outputs.wall_sec }}
          BE_WALL: ${{ needs.docker-backend.outputs.wall_sec }}
        run: |
          T1=$(date +%s)
          echo "## Deploy timings (wall-clock)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase | Seconds from setup (deploy_t0) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|---------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| setup (reference) | 0 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| parallel **vite-build** job (ends) | ${VITE_WALL:-n/a} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| parallel **docker-backend** job (ends) | ${BE_WALL:-n/a} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **deploy** job to this step | $((T1 - DEPLOY_T0)) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Open each job in the GitHub Actions UI for per-step duration. Compare **vite-build** vs **docker-backend** wall times to see which parallel leg is slower." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 大陆 VPS 提示" >> "$GITHUB_STEP_SUMMARY"
          echo "- 拉 **Docker Hub** 基础镜像慢：仓库 Variables 设 \`DEPLOY_REGION=cn\`。" >> "$GITHUB_STEP_SUMMARY"
          echo "- 拉 **ghcr.io** 慢/断连：设 \`DEPLOY_PULL_FROM_MIRROR=true\` 并配置国内镜像仓；可用 \`MIRROR_STEP_TIMEOUT_MIN\` 调整同步超时。" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # VPS 本地构建镜像（调试）：不走并行镜像 job
  # ---------------------------------------------------------------------------
  deploy-build-on-server:
    needs: setup
    if: ${{ vars.DEPLOY_BUILD_ON_SERVER == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}
        run: |
          set -euo pipefail
          export VITE_API_BASE_URL="${VITE_API_BASE_URL:-/api}"
          export VITE_APP_NAME="${VITE_APP_NAME:-}"
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Prepare SSH known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync code to server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ needs.setup.outputs.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" "sudo mkdir -p \"$DEPLOY_PATH\""
          rsync -az --delete \
            -e "ssh -i /tmp/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=yes" \
            --rsync-path="sudo rsync" \
            --exclude ".git/" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "backend/.env" \
            --exclude "frontend/.env" \
            --exclude "node_modules/" \
            --exclude "frontend/node_modules/" \
            --exclude "backend/node_modules/" \
            --exclude "backend/uploads/" \
            --exclude "frontend/dist/" \
            --exclude "backend/dist/" \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Deploy on server (docker compose --build)
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          command_timeout: 240m
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ needs.setup.outputs.DEPLOY_PATH }}"
            ENV_FILE="${{ needs.setup.outputs.ENV_FILE }}"
            cd "$DEPLOY_PATH"
            echo "⚠️ DEPLOY_BUILD_ON_SERVER=true — building on VPS (slow)"
            REGION="${{ vars.DEPLOY_REGION }}"
            case "${REGION:-global}" in
              cn)
                echo "🔧 DEPLOY_REGION=cn: merging CN Docker Hub mirrors..."
                sudo mkdir -p /etc/docker
                if command -v python3 >/dev/null 2>&1; then
                  MERGE_OUT=$(sudo python3 "$DEPLOY_PATH/scripts/merge-docker-mirrors.py")
                  if [ "$MERGE_OUT" = "restart" ]; then
                    sudo systemctl daemon-reload
                    sudo systemctl restart docker
                    sleep 5
                  fi
                fi
                ;;
            esac
            sudo mkdir -p "$DEPLOY_PATH"
            if [ ! -f "$DEPLOY_PATH/$ENV_FILE" ] && [ -f "$DEPLOY_PATH/$ENV_FILE.example" ]; then
              sudo cp "$DEPLOY_PATH/$ENV_FILE.example" "$DEPLOY_PATH/$ENV_FILE"
            fi
            if [ "${{ needs.setup.outputs.ENV }}" = "development" ]; then
              sudo sed -i '/^FRONTEND_HOST_BIND=/d;/^FRONTEND_HOST_PORT=/d;/^POSTGRES_HOST_BIND=/d;/^POSTGRES_HOST_PORT=/d;/^REDIS_HOST_BIND=/d;/^REDIS_HOST_PORT=/d' "$DEPLOY_PATH/$ENV_FILE"
              sudo bash -c "printf '\nFRONTEND_HOST_BIND=0.0.0.0\nFRONTEND_HOST_PORT=8080\nPOSTGRES_HOST_BIND=127.0.0.1\nPOSTGRES_HOST_PORT=5433\nREDIS_HOST_BIND=127.0.0.1\nREDIS_HOST_PORT=6380\n' >> '$DEPLOY_PATH/$ENV_FILE'"
              echo "🧹 Cleaning up old dev containers..."
              sudo docker stop testcase_dev_redis testcase_dev_postgres testcase_dev_backend testcase_dev_frontend 2>/dev/null || true
              sudo docker rm testcase_dev_redis testcase_dev_postgres testcase_dev_backend testcase_dev_frontend 2>/dev/null || true
            fi
            if [ "${{ needs.setup.outputs.ENV }}" = "development" ]; then
              STACK_PREFIX="${STACK_PREFIX:-testcase_dev}"
              COMPOSE_FILES="-f docker-compose.full.yml -f docker-compose.dev.override.yml"
              export FRONTEND_HOST_PORT=8080
              export POSTGRES_HOST_PORT=5433
              export REDIS_HOST_PORT=6380
            else
              STACK_PREFIX="${STACK_PREFIX:-testcase}"
              COMPOSE_FILES="-f docker-compose.full.yml"
              export FRONTEND_HOST_PORT=80
              export POSTGRES_HOST_PORT=5432
              export REDIS_HOST_PORT=6379
            fi
            export STACK_PREFIX
            export COMPOSE_ENV_FILE="$ENV_FILE"
            SMOKE_COMPOSE_FILE="docker-compose.full.yml"
            deploy_compose_env=(DOCKER_BUILDKIT=1 BUILDKIT_PROGRESS=plain STACK_PREFIX="$STACK_PREFIX" FRONTEND_HOST_PORT="$FRONTEND_HOST_PORT" POSTGRES_HOST_PORT="$POSTGRES_HOST_PORT" REDIS_HOST_PORT="$REDIS_HOST_PORT")
            if [ -n "${{ vars.APK_MIRROR }}" ]; then
              export APK_MIRROR="${{ vars.APK_MIRROR }}"
              deploy_compose_env+=(APK_MIRROR="$APK_MIRROR")
            fi
            sudo env "${deploy_compose_env[@]}" docker compose $COMPOSE_FILES --env-file "$ENV_FILE" up -d --build
            echo "✅ Deployment to ${{ needs.setup.outputs.ENV }} completed"
            if [ "${{ needs.setup.outputs.ENV }}" = "development" ]; then
              ok=0
              for i in $(seq 1 60); do
                if curl -fsS "http://127.0.0.1:8080/health" 2>/dev/null | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
                  ok=1
                  break
                fi
                sleep 2
              done
              if [ "$ok" != "1" ]; then
                exit 1
              fi
            else
              env STACK_PREFIX="$STACK_PREFIX" COMPOSE_ENV_FILE="$ENV_FILE" COMPOSE_FILE="$SMOKE_COMPOSE_FILE" bash scripts/smoke.sh
            fi
