# 云服务器生产部署：推送 main 时 rsync + docker compose 全栈（不依赖 Railway）。
# Deploy to your own VPS over SSH when pushing to main.
#
# GitHub → Repository → Settings → Secrets and variables → Actions
#   Secrets (required):
#     SSH_HOST      — server IP or domain
#     SSH_USER      — e.g. ubuntu
#     SSH_KEY       — private key (PEM), full text including BEGIN/END lines
#   Secrets (optional):
#     SSH_PORT      — default 22 if omitted
#
#   Variables (optional): Repository → Variables
#     DEPLOY_PATH   — absolute path to the repo on the server (default below)
#
# Server prerequisites:
#   - No need for git clone on server (workflow rsyncs code).
#   - Docker Engine + docker compose plugin; user in docker group OR script uses sudo (see script).
#   - rsync installed on server (Ubuntu: sudo apt-get install -y rsync)
#
name: Deploy to VPS

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # backend 首次构建（apk+pnpm）在弱网 VPS 上可能较慢；须大于 ssh-action command_timeout
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 与生产一致：在 Runner 上先打包前端，rsync 到云服务器后 Docker 可直接复用 dist/（见 frontend/Dockerfile）
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}
        run: |
          set -euo pipefail
          export VITE_API_BASE_URL="${VITE_API_BASE_URL:-/api}"
          export VITE_APP_NAME="${VITE_APP_NAME:-}"
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Prepare SSH known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Determine environment and deployment path
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "ENV=development" >> $GITHUB_OUTPUT
            echo "DEPLOY_PATH=${{ vars.DEV_DEPLOY_PATH || '/opt/lewis_testcase_platform_dev' }}" >> $GITHUB_OUTPUT
            echo "ENV_FILE=.env.development" >> $GITHUB_OUTPUT
          else
            echo "ENV=production" >> $GITHUB_OUTPUT
            echo "DEPLOY_PATH=${{ vars.DEPLOY_PATH || '/opt/lewis_testcase_platform' }}" >> $GITHUB_OUTPUT
            echo "ENV_FILE=.env" >> $GITHUB_OUTPUT
          fi

      - name: Rsync code to server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ steps.env.outputs.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # NOTE: /opt/* 通常归 root 所有；使用 sudo mkdir + sudo rsync 写入，避免 Permission denied
          ssh -i /tmp/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" "sudo mkdir -p \"$DEPLOY_PATH\""

          rsync -az --delete \
            -e "ssh -i /tmp/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=yes" \
            --rsync-path="sudo rsync" \
            --exclude ".git/" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "backend/.env" \
            --exclude "frontend/.env" \
            --exclude "node_modules/" \
            --exclude "frontend/node_modules/" \
            --exclude "backend/node_modules/" \
            --exclude "backend/uploads/" \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Deploy on server (docker compose)
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          # 须小于 job timeout-minutes；backend 构建可能接近 1h（弱网 / 首次）
          command_timeout: 70m
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ steps.env.outputs.DEPLOY_PATH }}"
            ENV_FILE="${{ steps.env.outputs.ENV_FILE }}"
            cd "$DEPLOY_PATH"
            
            echo "🚀 Deploying to ${{ steps.env.outputs.ENV }} environment at $DEPLOY_PATH"
            
            # 合并 registry-mirrors（勿整文件覆盖：避免清空用户已有的 insecure-registries 等配置）
            echo "🔧 Ensuring Docker registry mirrors (merge into daemon.json)..."
            sudo mkdir -p /etc/docker
            if command -v python3 >/dev/null 2>&1; then
              MERGE_OUT=$(sudo python3 "$DEPLOY_PATH/scripts/merge-docker-mirrors.py")
              if [ "$MERGE_OUT" = "restart" ]; then
                echo "✅ daemon.json updated, restarting Docker..."
                sudo systemctl daemon-reload
                sudo systemctl restart docker
                sleep 5
              else
                echo "✅ registry mirrors already satisfied"
              fi
            else
              echo "⚠️ python3 not found; cannot merge daemon.json. Install python3 or set registry-mirrors manually."
            fi
            
            # 确保部署目录和 .env 文件存在
            sudo mkdir -p "$DEPLOY_PATH"
            if [ ! -f "$DEPLOY_PATH/$ENV_FILE" ]; then
              echo "⚠️  $ENV_FILE not found, copying from example..."
              if [ -f "$DEPLOY_PATH/$ENV_FILE.example" ]; then
                sudo cp "$DEPLOY_PATH/$ENV_FILE.example" "$DEPLOY_PATH/$ENV_FILE"
                echo "✅ Created $ENV_FILE from template. Please edit it with production values!"
              fi
            fi
            
            # 开发环境强制使用独立端口，避免与生产环境冲突
            if [ "${{ steps.env.outputs.ENV }}" = "development" ]; then
              sudo sed -i '/^FRONTEND_HOST_BIND=/d;/^FRONTEND_HOST_PORT=/d;/^POSTGRES_HOST_BIND=/d;/^POSTGRES_HOST_PORT=/d;/^REDIS_HOST_BIND=/d;/^REDIS_HOST_PORT=/d' "$DEPLOY_PATH/$ENV_FILE"
              sudo bash -c "printf '\nFRONTEND_HOST_BIND=0.0.0.0\nFRONTEND_HOST_PORT=8080\nPOSTGRES_HOST_BIND=127.0.0.1\nPOSTGRES_HOST_PORT=5433\nREDIS_HOST_BIND=127.0.0.1\nREDIS_HOST_PORT=6380\n' >> '$DEPLOY_PATH/$ENV_FILE'"
            fi
            
            # 开发环境：先停止并删除旧容器，释放端口
            if [ "${{ steps.env.outputs.ENV }}" = "development" ]; then
              echo "🧹 Cleaning up old development containers..."
              # 停止并删除开发环境容器（如果存在）
              sudo docker stop testcase_dev_redis testcase_dev_postgres testcase_dev_backend testcase_dev_frontend 2>/dev/null || true
              sudo docker rm testcase_dev_redis testcase_dev_postgres testcase_dev_backend testcase_dev_frontend 2>/dev/null || true
              echo "✅ Old containers cleaned up"
            fi
            
            # 与同机生产栈区分容器名（否则固定 testcase_postgres 会与旧容器冲突）
            if [ "${{ steps.env.outputs.ENV }}" = "development" ]; then
              STACK_PREFIX="${STACK_PREFIX:-testcase_dev}"
              COMPOSE_FILES="-f docker-compose.full.yml -f docker-compose.dev.override.yml"
              # 开发环境独立端口配置
              export FRONTEND_HOST_PORT=8080
              export POSTGRES_HOST_PORT=5433
              export REDIS_HOST_PORT=6380
            else
              STACK_PREFIX="${STACK_PREFIX:-testcase}"
              COMPOSE_FILES="-f docker-compose.full.yml"
              # 生产环境默认端口配置
              export FRONTEND_HOST_PORT=80
              export POSTGRES_HOST_PORT=5432
              export REDIS_HOST_PORT=6379
            fi
            export STACK_PREFIX
            export COMPOSE_ENV_FILE="$ENV_FILE"
            
            # 勿使用 build --no-cache：每次部署都会重跑 apk/canvas 依赖层，在小型 VPS 上极慢且易被误判为「卡住」
            # 需要彻底重建时在服务器手动执行: docker compose ... build --no-cache && up -d
            # BUILDKIT_PROGRESS=plain：apk/pnpm 长时间无 classic 进度条时仍能看到底层输出
            if sudo docker compose version >/dev/null 2>&1; then
              sudo env DOCKER_BUILDKIT=1 BUILDKIT_PROGRESS=plain STACK_PREFIX="$STACK_PREFIX" FRONTEND_HOST_PORT="$FRONTEND_HOST_PORT" POSTGRES_HOST_PORT="$POSTGRES_HOST_PORT" REDIS_HOST_PORT="$REDIS_HOST_PORT" docker compose $COMPOSE_FILES --env-file "$ENV_FILE" up -d --build
            else
              sudo env DOCKER_BUILDKIT=1 BUILDKIT_PROGRESS=plain STACK_PREFIX="$STACK_PREFIX" FRONTEND_HOST_PORT="$FRONTEND_HOST_PORT" POSTGRES_HOST_PORT="$POSTGRES_HOST_PORT" REDIS_HOST_PORT="$REDIS_HOST_PORT" docker-compose $COMPOSE_FILES --env-file "$ENV_FILE" up -d --build
            fi
            
            echo "✅ Deployment to ${{ steps.env.outputs.ENV }} completed"
            
            # 开发环境smoke检查（通过前端代理检查后端健康状态）
            if [ "${{ steps.env.outputs.ENV }}" = "development" ]; then
              echo "🧪 Running development smoke check on port 8080..."
              ok=0
              for i in $(seq 1 60); do
                if curl -fsS "http://127.0.0.1:8080/health" 2>/dev/null | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
                  ok=1
                  break
                fi
                sleep 2
              done
              if [ "$ok" != "1" ]; then
                echo "❌ Smoke check failed after waiting 60s"
                sudo env STACK_PREFIX="$STACK_PREFIX" docker compose $COMPOSE_FILES --env-file "$ENV_FILE" ps || true
                sudo env STACK_PREFIX="$STACK_PREFIX" docker compose $COMPOSE_FILES --env-file "$ENV_FILE" logs --tail=100 backend || true
                exit 1
              fi
              echo "✅ Smoke check passed"
              echo "访问地址: http://${{ secrets.SSH_HOST }}:8080"
            else
              env STACK_PREFIX="$STACK_PREFIX" COMPOSE_ENV_FILE="$ENV_FILE" bash scripts/smoke.sh
            fi
