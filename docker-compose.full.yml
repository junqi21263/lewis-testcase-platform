services:
  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 与 frontend/.env.production / Vite 约定一致；同源反代保持 /api 即可
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_APP_NAME: ${VITE_APP_NAME:-}
    container_name: testcase_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - testcase_network

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: testcase_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://testcase_user:testcase_pass@postgres:5432/testcase_db}
      - JWT_SECRET=${JWT_SECRET:-change-me}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin@123456}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://open.bigmodel.cn/api/paas/v4/}
      - DEFAULT_AI_MODEL=${DEFAULT_AI_MODEL:-glm-4.5}
      - FRONTEND_URL=${FRONTEND_URL:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - AUTH_ALLOW_PLAINTEXT_PASSWORD=${AUTH_ALLOW_PLAINTEXT_PASSWORD:-}
      - UPLOAD_DIR=${UPLOAD_DIR:-./uploads}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      - APP_PORT=${APP_PORT:-3000}
      - THROTTLE_TTL=${THROTTLE_TTL:-60}
      - THROTTLE_LIMIT=${THROTTLE_LIMIT:-100}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - testcase_network

  # 数据库服务
  postgres:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    container_name: testcase_postgres
    restart: unless-stopped
    # 仅绑定本机，供 SSH 隧道 / 本机工具（如 Navicat）连到「与后端相同」的库；勿对公网 0.0.0.0 暴露
    ports:
      - '${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-testcase_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testcase_pass}
      POSTGRES_DB: ${DB_NAME:-testcase_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U testcase_user']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testcase_network

  # Redis 缓存服务
  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: testcase_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - testcase_network

volumes:
  postgres_data:
  redis_data:

networks:
  testcase_network:
    driver: bridge