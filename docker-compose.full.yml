version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: testcase_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - testcase_network

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: testcase_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://testcase_user:testcase_pass@postgres:5432/testcase_db
      - JWT_SECRET=docker-jwt-secret-2024-change-in-production
      - JWT_EXPIRES_IN=7d
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=Admin@123456
      - OPENAI_API_KEY=sk-docker-placeholder-api-key
      - OPENAI_BASE_URL=https://api.openai.com/v1
      - DEFAULT_AI_MODEL=gpt-4o
      - UPLOAD_DIR=./uploads
      - MAX_FILE_SIZE=10485760
      - APP_PORT=3000
      - THROTTLE_TTL=60
      - THROTTLE_LIMIT=100
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - testcase_network

  # 数据库服务
  postgres:
    image: postgres:15-alpine
    container_name: testcase_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: testcase_user
      POSTGRES_PASSWORD: testcase_pass
      POSTGRES_DB: testcase_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U testcase_user']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testcase_network

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: testcase_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - testcase_network

volumes:
  postgres_data:
  redis_data:

networks:
  testcase_network:
    driver: bridge